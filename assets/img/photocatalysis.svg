<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Photocatalytic hydrogen evolution</title>
  <desc id="desc">Sunlight drives charge separation in an organic photocatalyst and produces hydrogen.</desc>
