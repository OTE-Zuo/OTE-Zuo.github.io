<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Organic thermoelectric materials and devices</title>
  <desc id="desc">Flexible thermoelectric strip with hot and cold sides, heat flow and charge transport.</desc>
  <defs><marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#b14b3b"/></marker><marker id="arrb" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#0a6f9e"/></marker><style>.t{font:800 46px system-ui,Arial;fill:#17202a}.l{font:700 24px system-ui,Arial;fill:#17202a}.s{font:600 17px system-ui,Arial;fill:#5c6672}</style></defs>
  <rect width="1200" height="675" fill="#fff"/>
  <text class="t" x="600" y="78" text-anchor="middle">Thermoelectric Materials and Devices</text>
  <g transform="translate(70 164)" fill="none" stroke="#5c6672" stroke-width="3"><path d="M20 88 C70 34,132 128,184 70 S282 72,330 36"/><path d="M34 180 C96 136,146 224,206 164 S302 154,356 196"/><circle cx="20" cy="88" r="10" fill="#0a6f9e"/><circle cx="184" cy="70" r="10" fill="#b14b3b"/><circle cx="330" cy="36" r="10" fill="#3f7f54"/><circle cx="206" cy="164" r="10" fill="#695a9f"/><text class="s" x="10" y="260" stroke="none">conjugated polymers + dopants</text></g>
  <g transform="translate(430 248)"><rect x="0" y="58" width="96" height="152" rx="10" fill="#c74f3b"/><rect x="574" y="58" width="96" height="152" rx="10" fill="#2d72c8"/><path d="M76 116 C210 46,360 194,594 112 L594 156 C360 236,210 86,76 160 Z" fill="#dbeafe" stroke="#94a3b8" stroke-width="3"/><path d="M142 136 C268 84,394 190,536 134" stroke="#b14b3b" stroke-width="7" fill="none" marker-end="url(#arr)"/><path d="M540 166 C410 218,284 112,146 170" stroke="#0a6f9e" stroke-width="7" fill="none" marker-end="url(#arrb)"/><text class="l" x="12" y="42" fill="#b14b3b">Hot side</text><text class="l" x="576" y="42" fill="#0a6f9e">Cold side</text><text class="l" x="292" y="76" fill="#b14b3b">heat flow</text><text class="l" x="268" y="224" fill="#0a6f9e">charge transport</text></g>
  <g transform="translate(180 540)"><text class="s" x="0" y="0">doping control</text><text class="s" x="230" y="0">carrier transport</text><text class="s" x="500" y="0">flexible energy conversion</text></g>
</svg>
