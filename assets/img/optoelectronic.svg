<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Organic optoelectronic materials and devices</title>
  <desc id="desc">Layered organic optoelectronic device showing light absorption, excitons, charge separation and applications.</desc>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#0a6f9e"/></marker><style>.t{font:800 46px system-ui,Arial;fill:#17202a}.l{font:700 22px system-ui,Arial;fill:#17202a}.s{font:600 16px system-ui,Arial;fill:#5c6672}</style></defs>
  <rect width="1200" height="675" fill="#fff"/>
  <text class="t" x="600" y="78" text-anchor="middle">Optoelectronic Materials and Devices</text>
  <path d="M90 250 L310 334" stroke="#f4c542" stroke-width="24" opacity=".42"/><path d="M90 300 L310 356" stroke="#65b5e8" stroke-width="18" opacity=".5"/>
  <g transform="translate(300 175)"><rect x="0" y="242" width="560" height="42" fill="#a9b3c0"/><rect x="20" y="198" width="520" height="44" fill="#8ec5ff"/><rect x="40" y="108" width="480" height="90" fill="#9fcf88"/><rect x="20" y="64" width="520" height="44" fill="#8ec5ff"/><rect x="0" y="18" width="560" height="46" fill="#edf4fb" stroke="#b8c4d0"/><text class="l" x="70" y="160">light absorption</text><text class="l" x="242" y="160">exciton</text><text class="l" x="360" y="160">charge separation</text><circle cx="270" cy="146" r="18" fill="#f4c542"/><circle cx="405" cy="144" r="15" fill="#0a6f9e"/><circle cx="445" cy="168" r="15" fill="#b14b3b"/><path d="M420 95 C470 94,506 87,548 76" stroke="#0a6f9e" stroke-width="6" fill="none" marker-end="url(#a)"/><path d="M450 220 C492 218,520 226,548 234" stroke="#b14b3b" stroke-width="6" fill="none"/></g>
  <g transform="translate(920 190)"><rect x="0" y="0" width="170" height="92" rx="12" fill="#f7f9fb" stroke="#d9e0e7"/><text class="s" x="85" y="54" text-anchor="middle">OLED / Display</text><rect x="0" y="130" width="170" height="92" rx="12" fill="#f7f9fb" stroke="#d9e0e7"/><text class="s" x="85" y="184" text-anchor="middle">Photodetector</text><rect x="0" y="260" width="170" height="92" rx="12" fill="#f7f9fb" stroke="#d9e0e7"/><text class="s" x="85" y="314" text-anchor="middle">Solar cell</text></g>
</svg>
