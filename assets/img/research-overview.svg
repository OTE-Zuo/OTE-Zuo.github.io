  <rect class="panel" x="28" y="30" width="1144" height="615" rx="18"/>
  <text class="title" x="600" y="82" text-anchor="middle">Organic Materials, Transport Physics and Devices</text>
  <g transform="translate(72 146)"><rect class="node" x="0" y="0" width="210" height="160" rx="16"/><text class="label" x="105" y="36" text-anchor="middle">Molecular Design</text><g stroke="#17202a" stroke-width="3" fill="none" opacity=".85"><path d="M56 98 L84 66 L125 82 L154 53"/><circle cx="56" cy="98" r="10" fill="#0a6f9e"/><circle cx="84" cy="66" r="10" fill="#b14b3b"/><circle cx="125" cy="82" r="10" fill="#3f7f54"/><circle cx="154" cy="53" r="10" fill="#695a9f"/><path d="M48 128 C86 112,124 134,166 112"/></g></g>
