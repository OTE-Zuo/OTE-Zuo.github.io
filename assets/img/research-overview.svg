<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Research overview</title>
  <desc id="desc">Workflow from molecular design to transport mechanisms, devices and applications with modeling feedback.</desc>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="#0a6f9e"/></marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="#695a9f"/></marker>
    <style>.bg{fill:#fff}.panel{fill:#f7f9fb;stroke:#d9e0e7;stroke-width:2}.title{font:700 34px system-ui,Arial;fill:#17202a}.label{font:700 22px system-ui,Arial;fill:#17202a}.small{font:600 16px system-ui,Arial;fill:#5c6672}.blue{stroke:#0a6f9e}.purple{stroke:#695a9f}.red{stroke:#b14b3b}.line{fill:none;stroke-width:4;stroke-linecap:round;stroke-linejoin:round}.node{fill:#fff;stroke:#d9e0e7;stroke-width:2}.chip{fill:#fff;stroke:#d9e0e7;stroke-width:2}</style>
  </defs>
